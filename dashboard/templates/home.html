<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #0f172a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
}

/* glow blobs */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: -10%;
  width: 60%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(34,197,94,.06) 0%, transparent 70%);
  pointer-events: none;
}

.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
  padding: 24px;
  width: 100%;
  max-width: 560px;
}

/* ── Brand ── */
.brand {
  text-align: center;
}
.brand-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 6px 28px rgba(34,197,94,.30);
}
.brand-icon i { font-size: 30px; color: #fff; }
.brand-title {
  font-size: 26px;
  font-weight: 800;
  color: #f1f5f9;
  letter-spacing: -0.5px;
}
.brand-sub {
  font-size: 13px;
  color: #475569;
  margin-top: 6px;
  letter-spacing: 0.3px;
}

/* ── Buttons ── */
.nav-cards {
  display: flex;
  gap: 20px;
  width: 100%;
}

.nav-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 32px 20px 28px;
  border-radius: 16px;
  text-decoration: none;
  border: 1.5px solid #1e293b;
  background: #1e293b;
  transition: all .2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.nav-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity .2s;
}

.nav-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,.4);
}

/* Bots card — green */
.nav-card.bots {
  border-color: #166534;
}
.nav-card.bots::before {
  background: linear-gradient(135deg, rgba(34,197,94,.08), transparent);
}
.nav-card.bots:hover {
  border-color: #22c55e;
  box-shadow: 0 16px 40px rgba(34,197,94,.15);
}
.nav-card.bots:hover::before { opacity: 1; }

/* Backtests card — blue */
.nav-card.backtests {
  border-color: #1e3a5f;
}
.nav-card.backtests::before {
  background: linear-gradient(135deg, rgba(59,130,246,.08), transparent);
}
.nav-card.backtests:hover {
  border-color: #3b82f6;
  box-shadow: 0 16px 40px rgba(59,130,246,.15);
}
.nav-card.backtests:hover::before { opacity: 1; }

.nav-card-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.nav-card.bots .nav-card-icon {
  background: linear-gradient(135deg, #22c55e22, #16a34a22);
  border: 1.5px solid #166534;
}
.nav-card.backtests .nav-card-icon {
  background: linear-gradient(135deg, #3b82f622, #2563eb22);
  border: 1.5px solid #1e3a5f;
}
.nav-card.bots:hover .nav-card-icon { border-color: #22c55e; }
.nav-card.backtests:hover .nav-card-icon { border-color: #3b82f6; }

.nav-card-icon i {
  font-size: 26px;
}
.nav-card.bots .nav-card-icon i { color: #22c55e; }
.nav-card.backtests .nav-card-icon i { color: #3b82f6; }

.nav-card-label {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.2px;
  position: relative;
  z-index: 1;
}
.nav-card.bots .nav-card-label { color: #e2e8f0; }
.nav-card.backtests .nav-card-label { color: #e2e8f0; }

.nav-card-desc {
  font-size: 11.5px;
  color: #475569;
  text-align: center;
  line-height: 1.5;
  position: relative;
  z-index: 1;
}

.nav-card-arrow {
  font-size: 13px;
  color: #334155;
  position: relative;
  z-index: 1;
  transition: color .2s, transform .2s;
}
.nav-card:hover .nav-card-arrow {
  transform: translateX(3px);
}
.nav-card.bots:hover .nav-card-arrow { color: #22c55e; }
.nav-card.backtests:hover .nav-card-arrow { color: #3b82f6; }

/* ── Footer ── */
.footer {
  font-size: 11px;
  color: #1e293b;
  letter-spacing: 0.5px;
}

/* ── Mobile ── */
@media (max-width: 480px) {
  .nav-cards { flex-direction: column; gap: 14px; }
  .nav-card { flex-direction: row; padding: 20px 20px; text-align: left; align-items: flex-start; gap: 16px; }
  .nav-card-icon { flex-shrink: 0; width: 48px; height: 48px; }
  .nav-card-icon i { font-size: 22px; }
  .nav-card-content { flex: 1; }
  .nav-card-label { font-size: 15px; }
  .nav-card-desc { text-align: left; }
  .nav-card-arrow { align-self: center; margin-left: auto; flex-shrink: 0; }
  .brand-title { font-size: 22px; }
  .wrapper { gap: 36px; }
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="brand">
    <div class="brand-icon"><i class="bi bi-activity"></i></div>
    <div class="brand-title">Trading Dashboard</div>
    <div class="brand-sub">Select a section to continue</div>
  </div>

  <div class="nav-cards">

    <a href="/bots" class="nav-card bots">
      <div class="nav-card-icon"><i class="bi bi-robot"></i></div>
      <div class="nav-card-content">
        <div class="nav-card-label">Live Bots</div>
        <div class="nav-card-desc">Monitor ETH, BTC &amp; SPX bots, P&amp;L, positions and logs</div>
      </div>
      <div class="nav-card-arrow"><i class="bi bi-arrow-right"></i></div>
    </a>

    <a href="/backtests" class="nav-card backtests">
      <div class="nav-card-icon"><i class="bi bi-bar-chart-line"></i></div>
      <div class="nav-card-content">
        <div class="nav-card-label">Backtests</div>
        <div class="nav-card-desc">View strategy results, yearly returns and run new QC backtests</div>
      </div>
      <div class="nav-card-arrow"><i class="bi bi-arrow-right"></i></div>
    </a>

  </div>

  <div class="footer">TRADING DASHBOARD &nbsp;·&nbsp; SECURE ACCESS</div>

</div>

</body>
</html>
