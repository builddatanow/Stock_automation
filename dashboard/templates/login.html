<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Trading Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.login-card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 44px 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 25px 60px rgba(0,0,0,.5);
  position: relative;
  z-index: 1;
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}
.brand-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px rgba(34,197,94,.3);
}
.brand-icon i { font-size: 24px; color: #fff; }
.brand-title {
  font-size: 20px;
  font-weight: 700;
  color: #f1f5f9;
  margin: 0;
  letter-spacing: -0.3px;
}
.brand-sub {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
}

.form-label {
  font-size: 12px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 6px;
}
.form-control {
  background: #0f172a;
  border: 1.5px solid #334155;
  border-radius: 8px;
  color: #f1f5f9;
  font-size: 14px;
  padding: 10px 14px;
  transition: border-color .15s;
}
.form-control:focus {
  background: #0f172a;
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,.15);
  color: #f1f5f9;
  outline: none;
}
.form-control::placeholder { color: #475569; }

.input-group-text {
  background: #0f172a;
  border: 1.5px solid #334155;
  border-right: none;
  color: #475569;
  border-radius: 8px 0 0 8px;
}
.input-group .form-control { border-left: none; border-radius: 0 8px 8px 0; }
.input-group:focus-within .input-group-text {
  border-color: #22c55e;
}
.input-group:focus-within .form-control {
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,.15);
}

.btn-login {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  margin-top: 8px;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }

.alert-error {
  background: rgba(220,38,38,.12);
  border: 1px solid rgba(220,38,38,.3);
  color: #fca5a5;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.footer-note {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: #334155;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-activity"></i></div>
    <div class="brand-title">Trading Dashboard</div>
    <div class="brand-sub">Sign in to continue</div>
  </div>

  {% if error %}
  <div class="alert-error">
    <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
  </div>
  {% endif %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control"
               placeholder="admin" autocomplete="username" autofocus required>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
    </div>

    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div class="footer-note">Secure access · Session expires on browser close</div>
</div>

</body>
</html>
